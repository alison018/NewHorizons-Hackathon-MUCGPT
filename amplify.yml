version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd app/frontend
        - npm install
    build:
      commands:
        # 1) Export the environment variable
        - export NODE_OPTIONS="--max_old_space_size=4096"
        # 2) Run the build script
        - npm run buildlocal
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
