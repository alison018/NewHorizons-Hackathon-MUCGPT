version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Change directory to where the package.json is located
        - cd app/frontend
        # Install dependencies (use npm ci or npm install)
        - npm i
    build:
      commands:
        # Run build 
        - npm run buildlocal
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
