version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd app/frontend
        - npm install
    build:
      commands:
        - export NODE_OPTIONS="--max_old_space_size=4096"
        - npm run buildlocal
  artifacts:
    # Point Amplify to the correct output folder
    baseDirectory: app/backend/static
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
