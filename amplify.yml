version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Change directory to where the package.json is located
        - cd app/frontend
        # Install dependencies
        - npm install
    build:
      commands:
       - export NODE_OPTIONS="--max_old_space_size=4096"
        - npm run buildlocal
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
